
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Management - Career</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* WM Theme Background: Deep Forest Green */
            background: linear-gradient(135deg, #052e16 0%, #14532d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           INDUSTRIAL ANIMATION (Rising Squares)
           ========================================= */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .square {
            position: absolute;
            display: block;
            list-style: none;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            bottom: -150px;
            animation: rise 15s infinite linear;
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .square:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .square:nth-child(2){ left: 10%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; background: rgba(255, 196, 0, 0.1); }
        .square:nth-child(3){ left: 70%; width: 50px; height: 50px; animation-delay: 4s; }
        .square:nth-child(4){ left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .square:nth-child(5){ left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .square:nth-child(6){ left: 85%; width: 100px; height: 100px; animation-delay: 3s; background: rgba(29, 174, 79, 0.1); }

        @keyframes rise {
            0%{ transform: translateY(0) rotate(0deg); opacity: 1; }
            100%{ transform: translateY(-1000px) rotate(360deg); opacity: 0; }
        }

        /* =========================================
           MAIN CARD
           ========================================= */
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            border-top: 8px solid #ffc400; 
        }

        /* Header */
        .header { margin-bottom: 20px; }
        
        .wm-logo {
            font-size: 38px;
            font-weight: 900;
            color: #1b4634; 
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }
        
        .wm-logo span { color: #ffc400; }

        .subtitle {
            font-size: 14px;
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            border-bottom: 2px solid #eee;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Content Layout */
        .content {
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Image Styling */
        .img-box {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .worker-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #1b4634; 
            padding: 3px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            background: #ffc400;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            padding: 5px 15px;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Job Details */
        .info { width: 100%; }

        .salary-tag {
            background: #1b4634;
            color: #ffc400;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 15px;
            transform: skew(-10deg); 
        }

        .salary-text {
            display: inline-block;
            transform: skew(10deg); 
        }

        .perks {
            list-style: none;
            text-align: left;
            padding: 0 10px;
        }

        .perks li {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .perks li::before {
            content: '➤';
            color: #1b4634;
            font-weight: bold;
            margin-right: 10px;
            font-size: 14px;
        }

        /* =========================================
           ANIMATED BUTTON STYLES
           ========================================= */
        .btn-container { margin-top: 15px; }

        .apply-btn {
            display: block;
            width: 100%;
            background: linear-gradient(180deg, #ffc400 0%, #e6b000 100%);
            color: #1b4634;
            font-size: 20px;
            font-weight: 900;
            padding: 18px 0;
            border-radius: 6px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #b38600; 
            transition: all 0.1s;
            position: relative;
            overflow: hidden; /* Needed for the shine effect */
            
            /* Pulse Animation */
            animation: btnPulse 2s infinite ease-in-out;
        }

        .apply-btn:active {
            transform: translateY(4px) !important; /* Force down on click */
            box-shadow: 0 1px 0 #b38600 !important;
        }

        /* Shine Effect Overlay */
        .apply-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: btnShine 3s infinite;
        }

        /* Keyframes for Pulse */
        @keyframes btnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); } /* Slightly bigger */
            100% { transform: scale(1); }
        }

        /* Keyframes for Shine */
        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* Footer */
        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
            font-weight: 600;
        }

        /* Desktop Optimization */
        @media (min-width: 480px) {
            .content {
                flex-direction: row;
                align-items: center;
                text-align: left;
            }
            .img-box { margin-right: 15px; }
            .info { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="wm-logo">WASTE <span>MANAGEMENT</span></div>
            <div class="subtitle">Career Opportunities</div>
        </div>

        <div class="content">
            <div class="img-box">
                <img src="https://i.postimg.cc/XvxcStRg/businesswoman-headset-video-chat-client-smiles-listens-forms-answer-call-center-service-middle-aged.webp" alt="WM Staff" class="worker-img">
                <div class="status-badge">Redyoffer.com</div>
            </div>

            <div class="info">
                <div class="salary-tag">
                    <span class="salary-text">$25 - $30+/hr</span>
                </div>
                <ul class="perks">
                    <li>Entry Level & Experienced</li>
                    <li>Full Benefits Package</li>
                    <li>Immediate Start</li>
                </ul>
            </div>
        </div>

        <div class="btn-container">
            <a href="https://www.af9m8trk.com/2H711QCY/L29128D9/?s1=WasteManagement" target="_blank" class="apply-btn">Apply Now</a>
        </div>

        <div class="footer">
            Submit your Email and Zip
        </div>
    </div>

</body>
</html>
